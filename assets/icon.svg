<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#0a0a1a"/>
  <circle cx="512" cy="512" r="420" fill="none" stroke="#112233" stroke-width="3"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="#112233" stroke-width="2"/>
  <!-- Missile body -->
  <g transform="translate(512, 512) rotate(-45)">
    <!-- Exhaust trail -->
    <ellipse cx="-180" cy="0" rx="80" ry="15" fill="#ff6600" opacity="0.6"/>
    <ellipse cx="-160" cy="0" rx="40" ry="8" fill="#ffcc00" opacity="0.8"/>
    <!-- Body -->
    <path d="M 120,0 Q 100,-20 -40,-22 L -100,-18 -100,18 -40,22 Q 100,20 120,0 Z" fill="#00bcd4"/>
    <!-- Nose highlight -->
    <path d="M 120,0 L 90,-12 90,12 Z" fill="#ffffff" opacity="0.4"/>
    <!-- Fins -->
    <path d="M -60,-20 L -80,-55 -95,-48 -85,-18 Z" fill="#007788"/>
    <path d="M -60,20 L -80,55 -95,48 -85,18 Z" fill="#007788"/>
    <!-- Seeker -->
    <circle cx="105" cy="0" r="8" fill="#00ff88" opacity="0.8"/>
  </g>
  <!-- Radar cone hint -->
  <path d="M 600,424 L 820,300 820,548 Z" fill="#00e5ff" opacity="0.08"/>
  <!-- Title arc -->
  <text x="512" y="900" text-anchor="middle" font-family="monospace" font-size="64" font-weight="bold" fill="#ffffff">MISSILE PURSUIT</text>
</svg>
